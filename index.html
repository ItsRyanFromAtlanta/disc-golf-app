<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
    <!-- viewport-fit=cover is required for env(safe-area-inset-*) to report
         non-zero values on notched/home-indicator phones; the bottom tab bar
         depends on it. -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#F4F1EA" />
    <!-- Self-hosted Oswald (variable, latin subset) so the display face is
         available offline in the app shell; preloaded so headings/CTAs don't
         flash in the fallback stack on cold start. -->
    <link rel="preload" href="/fonts/oswald-variable-latin.woff2" as="font" type="font/woff2" crossorigin />
    <title>Disc Golf Manager & Caddie</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
