name: Bug report
description: Report a reproducible product defect without secrets or personal data.
title: "[Bug]: "
labels: [bug]
body:
  - type: textarea
    id: outcome
    attributes:
      label: What happened?
      description: Include expected and actual behavior.
    validations:
      required: true
  - type: textarea
    id: reproduce
    attributes:
      label: Reproduction
      description: Minimal steps, route, and whether the activity was online/offline/paused.
    validations:
      required: true
  - type: input
    id: environment
    attributes:
      label: Environment
      description: Build/commit, browser or app version, device, and OS.
  - type: textarea
    id: evidence
    attributes:
      label: Sanitized evidence
      description: Logs or screenshots with credentials, names, locations, and user data removed.
