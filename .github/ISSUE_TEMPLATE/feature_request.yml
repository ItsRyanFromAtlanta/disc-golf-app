name: Feature request
description: Propose a user problem and measurable outcome.
title: "[Feature]: "
labels: [enhancement]
body:
  - type: textarea
    id: problem
    attributes:
      label: User problem
      description: Who experiences the problem, when, and what friction exists?
    validations:
      required: true
  - type: textarea
    id: outcome
    attributes:
      label: Desired outcome
      description: Describe success without prescribing an implementation.
    validations:
      required: true
  - type: textarea
    id: constraints
    attributes:
      label: Constraints and related features
      description: Offline, privacy, field-use, accessibility, or roadmap dependencies.
